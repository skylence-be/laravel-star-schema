name: tests

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/tests.yml'
      - 'phpunit.xml.dist'
      - 'phpstan.neon'
      - 'phpstan-baseline.neon'
      - 'rector.php'
      - 'composer.json'
      - 'composer.lock'
  pull_request:
    branches:
      - main
    paths:
      - '**.php'
      - 'phpunit.xml.dist'
      - 'phpstan.neon'
      - 'phpstan-baseline.neon'
      - 'rector.php'
      - 'composer.json'
      - 'composer.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rector:
    name: Rector
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Cache Rector results
        uses: actions/cache@v5
        with:
          path: .rector.cache
          key: rector-${{ hashFiles('src/**/*.php', 'config/**/*.php') }}
          restore-keys: rector-

      - name: Get changed PHP files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- 'src/**/*.php' 'config/**/*.php' | tr '\n' ' ')
          else
            FILES=$(git diff --name-only --diff-filter=ACMR HEAD~1...HEAD -- 'src/**/*.php' 'config/**/*.php' | tr '\n' ' ')
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT
          [ -z "$FILES" ] && echo "empty=true" >> $GITHUB_OUTPUT || echo "empty=false" >> $GITHUB_OUTPUT

      - name: Run Rector
        if: steps.changed.outputs.empty == 'false'
        run: vendor/bin/rector --dry-run ${{ steps.changed.outputs.files }}

  pint:
    name: Pint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Cache Pint results
        uses: actions/cache@v5
        with:
          path: .pint.cache
          key: pint-${{ hashFiles('src/**/*.php', 'config/**/*.php') }}
          restore-keys: pint-

      - name: Get changed PHP files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- 'src/**/*.php' 'config/**/*.php' | tr '\n' ' ')
          else
            FILES=$(git diff --name-only --diff-filter=ACMR HEAD~1...HEAD -- 'src/**/*.php' 'config/**/*.php' | tr '\n' ' ')
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT
          [ -z "$FILES" ] && echo "empty=true" >> $GITHUB_OUTPUT || echo "empty=false" >> $GITHUB_OUTPUT

      - name: Run Pint
        if: steps.changed.outputs.empty == 'false'
        run: echo ${{ steps.changed.outputs.files }} | xargs vendor/bin/pint --test --parallel

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Cache PHPStan results
        uses: actions/cache@v5
        with:
          path: .phpstan.cache
          key: phpstan-${{ hashFiles('src/**/*.php') }}
          restore-keys: phpstan-

      - name: Run PHPStan
        run: vendor/bin/phpstan --error-format=github --memory-limit=1G

  sqlite:
    name: SQLite - P${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [rector, pint, phpstan]

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Cache test results
        uses: actions/cache@v5
        with:
          path: .phpunit.cache
          key: phpunit-sqlite-${{ matrix.php }}-${{ hashFiles('src/**/*.php', 'tests/**/*.php') }}
          restore-keys: phpunit-sqlite-${{ matrix.php }}-

      - name: Execute tests
        run: vendor/bin/pest --compact --no-coverage
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

  mysql:
    name: MySQL 8 - P${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [rector, pint, phpstan]

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, bcmath
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Cache test results
        uses: actions/cache@v5
        with:
          path: .phpunit.cache
          key: phpunit-mysql-${{ matrix.php }}-${{ hashFiles('src/**/*.php', 'tests/**/*.php') }}
          restore-keys: phpunit-mysql-${{ matrix.php }}-

      - name: Execute tests
        run: vendor/bin/pest --compact --no-coverage
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: ''

  pgsql:
    name: PostgreSQL 17 - P${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [rector, pint, phpstan]

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    services:
      postgresql:
        image: postgres:17
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: testing
        ports:
          - 5432:5432
        options: --health-cmd=pg_isready --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_pgsql, bcmath
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Cache test results
        uses: actions/cache@v5
        with:
          path: .phpunit.cache
          key: phpunit-pgsql-${{ matrix.php }}-${{ hashFiles('src/**/*.php', 'tests/**/*.php') }}
          restore-keys: phpunit-pgsql-${{ matrix.php }}-

      - name: Execute tests
        run: vendor/bin/pest --compact --no-coverage
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: testing
          DB_PASSWORD: testing

  summary:
    name: Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [rector, pint, phpstan, sqlite, mysql, pgsql]
    if: always()

    steps:
      - name: All checks passed
        if: ${{ needs.rector.result == 'success' && needs.pint.result == 'success' && needs.phpstan.result == 'success' && needs.sqlite.result == 'success' && needs.mysql.result == 'success' && needs.pgsql.result == 'success' }}
        run: |
          echo "### All Checks Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Rector: Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Pint: Passed" >> $GITHUB_STEP_SUMMARY
          echo "- PHPStan: Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Tests (SQLite): Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Tests (MySQL): Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Tests (PostgreSQL): Passed" >> $GITHUB_STEP_SUMMARY

      - name: Some checks failed
        if: ${{ needs.rector.result != 'success' || needs.pint.result != 'success' || needs.phpstan.result != 'success' || needs.sqlite.result != 'success' || needs.mysql.result != 'success' || needs.pgsql.result != 'success' }}
        run: |
          echo "### Some Checks Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Rector: ${{ needs.rector.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Pint: ${{ needs.pint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- PHPStan: ${{ needs.phpstan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests (SQLite): ${{ needs.sqlite.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests (MySQL): ${{ needs.mysql.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests (PostgreSQL): ${{ needs.pgsql.result }}" >> $GITHUB_STEP_SUMMARY
          exit 1
